email:
  to: leimingcan@icloud.com
  subject_prefix: "🐦 X Digest"
  # 发送后从 Sent Items 删除，避免污染邮箱
  delete_after_send: true

schedule:
  timezone: Asia/Shanghai
  slots:
    morning: "06:00"
    evening: "22:00"

fetch:
  # 首次运行时的回填窗口（小时）
  first_run_backfill_hours: 24
  # 抓取时间窗（小时）—— 用 advanced_search 的 since_time 做服务端过滤，
  # 减少计费推文数。每天跑一档 → 26h 给 cron 漂移留 buffer。
  lookback_hours: 26
  # 过滤规则
  include_replies: false
  # 是否剔除纯 retweet（保留 quote tweet）
  exclude_pure_retweet: true

analysis:
  # 英文推附中文要点
  add_chinese_note_for_english: true
  # 不设推文数量上限
  cap_per_email: 0
